name: Nabiz 7-24 Nobet

# GitHub'in sunucularinda calisir — PC kapali olsa bile.
on:
  schedule:
    - cron: "*/30 * * * *"   # her 30 dakikada bir (UTC). Ucretsiz private tier altinda kalir.
  workflow_dispatch: {}        # Actions sekmesinden ELLE de tetiklenebilir (test icin)

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Tara ve Telegram'a bildir
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          WINDOW_MIN: "35"
          TEST_PING: ${{ github.event_name == 'workflow_dispatch' }}
        run: python cloud/nabiz_cloud_watch.py
