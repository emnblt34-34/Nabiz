<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0b0f" />
<title>Nabız · Borsa Duygu</title>
<style>
  :root{--bg:#0a0b0f;--surface:#14161d;--surface2:#1b1e27;--text:#e7e9ee;--muted:#878d9e;--faint:#5a6072;
    --pos:#36d399;--neg:#ff5d73;--accent:#7c5cff;--amber:#ffb454;--line:rgba(255,255,255,.07)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    max-width:680px;margin:0 auto;padding:20px 16px 48px}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
  .top{display:flex;align-items:center;gap:9px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--pos);position:relative}
  .dot::after{content:"";position:absolute;inset:-4px;border-radius:50%;background:var(--pos);opacity:.35;animation:ping 2s ease-out infinite}
  @keyframes ping{0%{transform:scale(1);opacity:.35}80%,100%{transform:scale(2.4);opacity:0}}
  h1{font-size:19px;font-weight:700;letter-spacing:-.02em}
  .sub{margin-left:auto;font-size:11px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase}
  .daily{margin-top:16px;background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .daily .h{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;margin-bottom:9px}
  .daily p{font-size:13px;line-height:1.6;color:var(--text)}
  .mood{margin-top:12px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px 15px}
  .mrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .mrow .l{font-size:12px;color:var(--muted)}
  .mrow .v{font-size:15px;font-weight:600}
  .gauge,.bar{position:relative;background:var(--surface2);border-radius:99px;overflow:hidden}
  .gauge{height:8px}.bar{height:7px;margin:12px 0 2px}
  .mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--faint);opacity:.5;z-index:2}
  .fp{position:absolute;left:50%;top:0;bottom:0;background:linear-gradient(90deg,#36d39933,var(--pos));border-radius:0 99px 99px 0;transition:width .6s}
  .fn{position:absolute;right:50%;top:0;bottom:0;background:linear-gradient(270deg,#ff5d7333,var(--neg));border-radius:99px 0 0 99px;transition:width .6s}
  .meta{display:flex;gap:14px;margin-top:11px;font-size:11px;color:var(--faint)}
  .meta b{color:var(--muted);font-weight:500}
  .controls{display:flex;gap:8px;margin-top:16px}
  .seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:3px}
  .seg button{background:none;border:none;color:var(--muted);font:inherit;font-size:12.5px;font-weight:500;padding:7px 13px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--surface2);color:var(--text)}
  .refresh{margin-left:auto;display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);color:var(--muted);font:inherit;font-size:12.5px;padding:7px 13px;border-radius:11px;cursor:pointer}
  .list{margin-top:14px;display:flex;flex-direction:column;gap:9px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px 16px}
  .card.spike{border-color:rgba(255,180,84,.5);box-shadow:0 0 0 1px rgba(255,180,84,.25)}
  .chead{display:flex;align-items:center;gap:10px;cursor:pointer}
  .sym{font-family:ui-monospace,monospace;font-weight:700;font-size:16px}
  .mkt{font-size:9.5px;color:var(--faint);border:1px solid var(--line);padding:2px 6px;border-radius:6px;letter-spacing:.06em}
  .vol{margin-left:auto;font-size:11px;color:var(--faint)}
  .score{font-family:ui-monospace,monospace;font-weight:700;font-size:15px;min-width:54px;text-align:right}
  .split{display:flex;justify-content:space-between;font-size:10.5px;color:var(--faint);margin-top:6px}
  .split .p{color:var(--pos)}.split .n{color:var(--neg)}
  .evid{margin-top:13px;padding-top:13px;border-top:1px solid var(--line)}
  .chips{display:flex;gap:8px;margin-bottom:11px}
  .chip{flex:1;background:var(--surface2);border-radius:10px;padding:9px 11px}
  .chip .cl{font-size:10.5px;color:var(--faint);margin-bottom:5px;display:flex;justify-content:space-between}
  .chip .cv{font-family:ui-monospace,monospace;font-weight:700;font-size:14px}
  .evgrp{font-size:10.5px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin:10px 0 4px}
  .ev{display:flex;gap:9px;padding:8px 0;font-size:12.5px;line-height:1.45;color:var(--muted);border-bottom:1px solid var(--line)}
  .ev .d{flex:0 0 6px;width:6px;height:6px;border-radius:50%;margin-top:6px}
  .ev .src{color:var(--faint);font-size:10.5px;margin-top:3px}
  .ev .cred{color:var(--accent)}
  .ev a{color:inherit;text-decoration:none}
  .state{text-align:center;padding:44px 20px;color:var(--muted)}
  .state h3{font-size:16px;color:var(--text);margin-bottom:7px}
  .skel{height:92px;border-radius:16px;background:var(--surface)}
  .disc{text-align:center;font-size:10.5px;color:var(--faint);margin-top:26px;line-height:1.5}
  /* --- Öngörü --- */
  .fcsum{margin-top:12px;background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--line);border-radius:16px;padding:14px 16px}
  .fcsum .h{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;margin-bottom:9px}
  .fcsum .row{display:flex;flex-wrap:wrap;gap:7px 16px;font-size:11.5px;color:var(--muted)}
  .fcsum .row b{color:var(--text);font-weight:600}
  .fcsum .note{margin-top:9px;font-size:10.5px;color:var(--faint);line-height:1.5}
  .fcast{display:flex;align-items:center;gap:10px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:11.5px;color:var(--faint)}
  .fdir{font-weight:700;font-size:11.5px;padding:3px 9px;border-radius:8px;white-space:nowrap}
  .fdir.up{color:var(--pos);background:rgba(54,211,153,.12)}
  .fdir.down{color:var(--neg);background:rgba(255,93,115,.12)}
  .fdir.neutral{color:var(--muted);background:var(--surface2)}
  .conf{height:5px;width:46px;background:var(--surface2);border-radius:99px;overflow:hidden;display:inline-block;vertical-align:middle}
  .conf>i{display:block;height:100%;background:var(--accent)}
  .fhz{margin-left:auto;color:var(--faint)}
  /* --- Kesitsel Öngörü (asıl sinyal) --- */
  .csx{margin-top:12px;background:linear-gradient(135deg,#141a26,#1b2333);border:1px solid rgba(124,92,255,.25);border-radius:16px;padding:14px 16px}
  .csx .h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:5px}
  .csx .rec{font-size:11px;color:var(--muted);line-height:1.5}
  .csx .rec b{color:var(--text);font-weight:600}
  .csx .badge{font-size:9.5px;padding:2px 8px;border-radius:7px;font-weight:600;letter-spacing:.02em}
  .csx .st-mid{background:rgba(255,180,84,.16);color:var(--amber)}
  .csx .st-ok{background:rgba(54,211,153,.16);color:var(--pos)}
  .csx .st-weak{background:var(--surface2);color:var(--muted)}
  .cslist{margin-top:10px}
  .csrow{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid var(--line);font-size:12.5px}
  .csrow .rk{color:var(--faint);font-size:10.5px;width:16px;text-align:right;font-family:ui-monospace,monospace}
  .csrow .tk{font-family:ui-monospace,monospace;font-weight:700;font-size:13.5px;min-width:52px}
  .csrow .mk{font-size:9px;color:var(--faint);border:1px solid var(--line);padding:1px 5px;border-radius:5px}
  .csrow .sd{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:6px;min-width:52px;text-align:center}
  .sd.long{color:var(--pos);background:rgba(54,211,153,.12)}
  .sd.short{color:var(--neg);background:rgba(255,93,115,.12)}
  .sd.neutral{color:var(--muted);background:var(--surface2)}
  .csrow .sc{font-family:ui-monospace,monospace;font-size:11.5px;width:48px;text-align:right;font-variant-numeric:tabular-nums}
  .csrow .se{font-family:ui-monospace,monospace;font-size:11px;min-width:60px;text-align:right;font-variant-numeric:tabular-nums}
  .csrow .nw{font-size:10px;min-width:30px;text-align:right;color:var(--amber)}
  .csrow .rg{font-size:10px;color:var(--faint);margin-left:auto}
  /* --- Mum grafiği --- */
  .chart-wrap{margin:6px 0 13px}
  .cftabs{display:flex;gap:6px;margin-bottom:8px}
  .cftabs button{background:var(--surface2);border:1px solid var(--line);color:var(--muted);font:inherit;font-size:11.5px;font-weight:500;padding:5px 12px;border-radius:8px;cursor:pointer}
  .cftabs button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chart-wrap canvas{width:100%;height:180px;display:block;background:#0c0f16;border:1px solid var(--line);border-radius:10px}
  .cflabel{font-size:11px;color:var(--muted);margin-top:7px;line-height:1.55}
  .cflabel b{font-weight:600}
  .spin{animation:rot 1s linear infinite}@keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="top">
    <span class="dot"></span><h1>Nabız</h1><span class="sub">yerel sunucu</span>
  </div>
  <div class="daily"><div class="h">📊 Günlük Analiz</div><p id="daily">Veri toplanıyor…</p></div>
  <div class="mood">
    <div class="mrow"><span class="l">Piyasa nabzı</span><span class="v" id="verdict">—</span></div>
    <div class="gauge"><span class="mid"></span><span class="fp" id="mfp"></span><span class="fn" id="mfn"></span></div>
    <div class="meta"><span><b id="mT">0</b> hisse</span><span><b id="mI">0</b> içerik</span><span id="mU">başlatılıyor…</span></div>
  </div>
  <div id="csx"></div>
  <div id="fcsum"></div>
  <div class="controls">
    <div class="seg" id="seg"><button data-m="all" class="on">Tümü</button><button data-m="BIST">BIST</button><button data-m="US">ABD</button></div>
    <button class="refresh" id="rb"><span id="ri">↻</span> Yenile</button>
  </div>
  <div class="list" id="list"></div>
  <p class="disc"><b>Duygu sinyalidir</b>, yatırım tavsiyesi değildir.<br>Kaynak: Reddit, StockTwits, RSS haber, KAP · bot filtresi aktif</p>

<script>
let FILTER="all", SCORES=[], FC={items:{},meta:null};
const $=id=>document.getElementById(id);
const col=v=>v==null?"var(--faint)":Math.abs(v)<0.12?"var(--muted)":v>0?"var(--pos)":"var(--neg)";
const fmt=v=>v==null?"–":(v>=0?"+":"")+(+v).toFixed(2);
const pctf=v=>v==null?"–":Math.round(v*100)+"%";

async function load(){
  $("ri").className="spin";
  try{
    const [scores,st,dy,fc,cs]=await Promise.all([
      fetch("/api/scores?window=24h").then(r=>r.json()),
      fetch("/api/status").then(r=>r.json()),
      fetch("/api/daily").then(r=>r.json()),
      fetch("/api/forecast").then(r=>r.json()).catch(()=>null),
      fetch("/api/crosssection").then(r=>r.json()).catch(()=>null),
    ]);
    SCORES=scores; $("daily").textContent=dy.text||"—";
    FC={meta:fc,items:{}}; if(fc&&fc.items) fc.items.forEach(i=>FC.items[i.ticker]=i);
    const t=st.last?new Date(st.last*1000).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}):null;
    $("mU").textContent = st.running?"toplanıyor…":(t?("son: "+t):"ilk toplama sürüyor…");
    renderCsx(cs); renderFcsum(); render();
  }catch(e){
    $("list").innerHTML='<div class="state"><h3>Sunucuya ulaşılamadı</h3><p>server.py çalışıyor mu? Terminali kontrol et.</p></div>';
  }finally{$("ri").className="";}
}

function renderFcsum(){
  const m=FC.meta;
  if(!m){$("fcsum").innerHTML="";return;}
  const hz=m.horizonHours||3;
  if(!m.ready){
    $("fcsum").innerHTML=`<div class="fcsum"><div class="h">🔮 Öngörü · gün içi (~${hz}s)</div>
      <div class="row">Model hazırlanıyor… (fiyat geçmişi indiriliyor, ilk turda ~1 dk).</div></div>`;
    return;
  }
  const oos=m.oos||{}, lv=m.live||{};
  const oosTxt = oos.hit!=null ? `<b>${pctf(oos.hit)}</b> <span style="color:var(--faint)">(OOS · p=${oos.p??'?'} · n=${oos.n||0})</span>` : '<b>—</b>';
  const liveTxt = lv.resolved ? `<b>${pctf(lv.hit_rate)}</b> (${lv.resolved} sonuçlandı)` : `<b>—</b> (${lv.open||0} bekliyor)`;
  $("fcsum").innerHTML=`<div class="fcsum">
    <div class="h">🔮 3-Saatlik Öngörü <span style="font-size:9.5px;padding:2px 8px;border-radius:7px;background:var(--surface2);color:var(--amber);font-weight:600">çok zayıf</span></div>
    <div class="row">
      <span>model: <b>${m.model||"—"}</b></span>
      <span>3s isabet (dürüst OOS): ${oosTxt}</span>
      <span>canlı: ${liveTxt}</span>
    </div>
    <div class="note">⚠️ 3-saatlik yön neredeyse yazı-tura (~%50, ekonomik olarak ihmal edilebilir); asıl ölçülen edge yukarıdaki <b>günlük kesitsel</b> panelde. ${m.disclaimer||""}</div></div>`;
}

function renderCsx(cs){
  if(!cs){$("csx").innerHTML="";return;}
  if(!cs.ready){
    $("csx").innerHTML=`<div class="csx"><div class="h">📊 Kesitsel Öngörü <span class="badge st-weak">hazırlanıyor</span></div>
      <div class="rec">${cs.status||"günlük model eğitiliyor… (ilk turda ~1-2 dk)"}</div></div>`;
    return;
  }
  const r=cs.record||{};
  const stClass=(r.dsr7!=null&&r.dsr7>0.95)?'st-ok':(r.bootstrap_p!=null&&r.bootstrap_p<0.05)?'st-mid':'st-weak';
  const rec=`Market-nötr backtest (${r.horizon_days||5}g · ${r.n_rebalances||0} rebalans): `
    +`Sharpe <b>${r.sharpe??'–'}</b> · DSR(7) <b>${r.dsr7??'–'}</b> · bootstrap p <b>${r.bootstrap_p??'–'}</b>`;
  const rows=(cs.ranking||[]).map(it=>{
    const lab=it.side==='long'?'GÜÇLÜ':it.side==='short'?'ZAYIF':'NÖTR';
    const sgn=(it.signal>=0?'+':'')+(+it.signal).toFixed(2);
    const se = it.sentiment==null
      ? `<span class="se" style="color:var(--faint)" title="duygu verisi yok">💬 –</span>`
      : `<span class="se" style="color:${col(it.sentiment)}" title="${it.sent_n} yorum/haber">💬 ${(it.sentiment>=0?'+':'')+(+it.sentiment).toFixed(2)}</span>`;
    const nb = (it.news_n>0)
      ? `<span class="nw" title="son 48 saatte ${it.news_n} haber">📰${it.news_n}</span>` : '<span class="nw"></span>';
    return `<div class="csrow"><span class="rk">${it.rank}</span>
      <span class="tk">${it.ticker}</span><span class="mk">${it.market}</span>
      <span class="sd ${it.side}">${lab}</span>
      <span class="sc" style="color:${col(it.signal)}">${sgn}</span>
      ${se}${nb}
      <span class="rg">${esc(it.regime||'')}</span></div>`;
  }).join("");
  $("csx").innerHTML=`<div class="csx">
    <div class="h">📊 Kesitsel Öngörü <span class="badge ${stClass}">${esc(cs.status||'')}</span></div>
    <div class="rec">${rec}</div>
    <div class="cslist">${rows}</div>
    <div class="rec" style="margin-top:9px">${esc(cs.note||"")}</div>
  </div>`;
}

function render(){
  const f=SCORES.filter(s=>FILTER==="all"||s.market===FILTER);
  const tv=f.reduce((a,s)=>a+s.volume,0);
  const ov=tv?f.reduce((a,s)=>a+s.sentiment*s.volume,0)/tv:0;
  const pct=Math.min(Math.abs(ov)*50,50), pos=ov>=0;
  $("mfp").style.width=pos?pct+"%":"0"; $("mfn").style.width=pos?"0":pct+"%";
  const lab=ov>0.4?"Güçlü pozitif":ov>0.12?"Hafif pozitif":ov<-0.4?"Güçlü negatif":ov<-0.12?"Hafif negatif":"Nötr";
  $("verdict").textContent=SCORES.length?lab:"—"; $("verdict").style.color=col(ov);
  $("mT").textContent=f.length; $("mI").textContent=tv;
  if(!f.length){$("list").innerHTML='<div class="state"><h3>Henüz veri yok</h3><p>İlk toplama birkaç dakika sürebilir. Otomatik yenilenir.</p></div>';return;}
  $("list").innerHTML=f.map(card).join("");
}

function card(s){
  const pos=s.sentiment>=0, pct=Math.min(Math.abs(s.sentiment)*50,50).toFixed(1);
  const spike=Math.abs(s.momentum)>=0.3&&s.volume>=2;
  const mom=s.momentum>0.01?"▲":s.momentum<-0.01?"▼":"–";
  return `<div class="card ${spike?'spike':''}" data-sym="${s.ticker}">
    <div class="chead" onclick="toggle('${s.ticker}')">
      <span class="sym">${s.ticker}</span><span class="mkt">${s.market}</span>
      ${spike?'<span style="font-size:10px;color:var(--amber);font-weight:600">⚡ ani</span>':''}
      <span class="vol"><span class="mono" style="color:var(--muted)">${s.volume}</span> içerik</span>
      <span class="score" style="color:${col(s.sentiment)}">${s.volume?fmt(s.sentiment):'–'}</span>
    </div>
    <div class="bar"><span class="mid"></span><span class="fp" style="width:${pos?pct:0}%"></span><span class="fn" style="width:${pos?0:pct}%"></span></div>
    <div class="split"><span class="p">${Math.round(s.posShare*100)}% pozitif</span>
      <span class="mono" style="color:${col(s.momentum)}">${mom} ${fmt(s.momentum)} momentum</span>
      <span class="n">${Math.round(s.negShare*100)}% negatif</span></div>
    ${fbadge(s.ticker)}
    <div id="ev-${s.ticker}"></div></div>`;
}

function fbadge(sym){
  const f=FC.items[sym]; if(!f) return "";
  const lab=f.direction==="up"?"▲ Yükseliş":f.direction==="down"?"▼ Düşüş":"– Yatay";
  const cf=Math.round((f.confidence||0.5)*100);
  const ex=f.expectedMovePct; const exTxt=ex==null?"":`bekl. ${ex>=0?"+":""}${(+ex).toFixed(2)}%`;
  return `<div class="fcast">
    <span class="fdir ${f.direction}">${lab}</span>
    <span>güven %${cf}</span><span class="conf"><i style="width:${cf}%"></i></span>
    <span class="mono" style="color:var(--muted)">${exTxt}</span>
    <span class="fhz">öngörü</span></div>`;
}

async function toggle(sym){
  const box=$("ev-"+sym);
  if(box.innerHTML){box.innerHTML="";return;}
  box.innerHTML = chartHTML(sym) +
    `<div id="news-${sym}"><div class="evid" style="color:var(--faint);font-size:12px">Yorumlar ve haberler yükleniyor…</div></div>`;
  loadChart(sym,'daily');
  loadNews(sym);
}

function chartHTML(sym){
  return `<div class="chart-wrap">
    <div class="cftabs" id="cftabs-${sym}">
      <button data-tf="hourly" onclick="loadChart('${sym}','hourly')">Saatlik</button>
      <button data-tf="daily" class="on" onclick="loadChart('${sym}','daily')">Günlük</button>
      <button data-tf="weekly" onclick="loadChart('${sym}','weekly')">Haftalık</button>
    </div>
    <canvas id="cv-${sym}"></canvas>
    <div class="cflabel" id="cflabel-${sym}">Grafik yükleniyor…</div>
  </div>`;
}

async function loadChart(sym,tf){
  document.querySelectorAll(`#cftabs-${sym} button`).forEach(b=>b.classList.toggle('on',b.dataset.tf===tf));
  try{ drawCandles(sym, await fetch(`/api/candles/${sym}?tf=${tf}`).then(r=>r.json())); }
  catch(e){ const l=$('cflabel-'+sym); if(l)l.textContent='Grafik yüklenemedi.'; }
}

function drawCandles(sym,d){
  const cv=$('cv-'+sym); if(!cv)return;
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth||320, H=180;
  cv.width=W*dpr; cv.height=H*dpr;
  const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
  const cs=(d.candles||[]).filter(c=>c.c!=null), proj=d.projection, lab=$('cflabel-'+sym);
  if(cs.length<2){ if(lab)lab.textContent='Yeterli veri yok.'; return; }
  const last=cs[cs.length-1].c;
  let lo=Infinity,hi=-Infinity;
  cs.forEach(c=>{ if(c.l!=null)lo=Math.min(lo,c.l); if(c.h!=null)hi=Math.max(hi,c.h); });
  if(proj){ hi=Math.max(hi,last*(1+(proj.drift_pct+proj.band_pct)/100)); lo=Math.min(lo,last*(1+(proj.drift_pct-proj.band_pct)/100)); }
  const pd=(hi-lo)*0.08||1; hi+=pd; lo-=pd;
  const pL=4,pR=4,pT=6,pB=6, plotW=W-pL-pR, plotH=H-pT-pB, histW=plotW*0.72, n=cs.length, cw=histW/n;
  const yOf=v=>pT+(hi-v)/(hi-lo)*plotH, xOf=i=>pL+i*cw+cw/2;
  cs.forEach((c,i)=>{ if(c.o==null)return;
    const up=c.c>=c.o, k=up?'#36d399':'#ff5d73', x=xOf(i);
    ctx.strokeStyle=k; ctx.fillStyle=k; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,yOf(c.h)); ctx.lineTo(x,yOf(c.l)); ctx.stroke();
    const bw=Math.max(1.5,cw*0.6), y1=yOf(c.o), y2=yOf(c.c);
    ctx.fillRect(x-bw/2,Math.min(y1,y2),bw,Math.max(1,Math.abs(y2-y1)));
  });
  const xLast=pL+histW;
  ctx.strokeStyle='rgba(255,255,255,.14)'; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(pL,yOf(last)); ctx.lineTo(W-pR,yOf(last)); ctx.stroke(); ctx.setLineDash([]);
  if(proj){
    const k=proj.direction==='up'?'#36d399':proj.direction==='down'?'#ff5d73':'#878d9e';
    const x1=W-pR, cE=last*(1+proj.drift_pct/100), uE=last*(1+(proj.drift_pct+proj.band_pct)/100), lE=last*(1+(proj.drift_pct-proj.band_pct)/100);
    ctx.fillStyle=k+'22';
    ctx.beginPath(); ctx.moveTo(xLast,yOf(last)); ctx.lineTo(x1,yOf(uE)); ctx.lineTo(x1,yOf(lE)); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=k; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(xLast,yOf(last)); ctx.lineTo(x1,yOf(cE)); ctx.stroke();
  }
  if(lab){
    if(proj){
      const ar=proj.direction==='up'?'▲':proj.direction==='down'?'▼':'▬';
      const dc=proj.direction==='up'?'var(--pos)':proj.direction==='down'?'var(--neg)':'var(--muted)';
      lab.innerHTML=`Öngörü (${proj.label}): <b style="color:${dc}">${ar} ${proj.drift_pct>=0?'+':''}${proj.drift_pct}%</b> · belirsizlik ±${proj.band_pct}% · <span style="color:var(--faint)">${esc(proj.strength)}</span><br><span style="color:var(--faint)">${esc(d.note||'')}</span>`;
    } else lab.innerHTML='<span style="color:var(--faint)">Öngörü yok (model hazırlanıyor).</span>';
  }
}

async function loadNews(sym){
  const box=$('news-'+sym); if(!box)return;
  try{
    const d=await fetch("/api/ticker/"+sym).then(r=>r.json());
    const nMean=mean(d.news), sMean=mean(d.social);
    box.innerHTML=`<div class="evid">
      <div class="chips">
        <div class="chip"><div class="cl"><span>📰 Haber</span><span class="mono">${d.news.length}</span></div><div class="cv" style="color:${col(nMean)}">${fmt(nMean)}</div></div>
        <div class="chip"><div class="cl"><span>💬 Yorum (retail)</span><span class="mono">${d.social.length}</span></div><div class="cv" style="color:${col(sMean)}">${fmt(sMean)}</div></div>
      </div>
      ${grp("Haberler",d.news)}
      ${grp("Yatırımcı yorumları",d.social)}
    </div>`;
  }catch(e){ box.innerHTML='<div class="evid" style="color:var(--faint)">Yüklenemedi.</div>'; }
}
function mean(arr){if(!arr||!arr.length)return null;return arr.reduce((a,i)=>a+(i.score||0),0)/arr.length;}
function grp(title,arr){
  if(!arr||!arr.length)return `<div class="evgrp">${title}</div><div style="font-size:12px;color:var(--faint);padding:6px 0">Veri yok.</div>`;
  return `<div class="evgrp">${title}</div>`+arr.slice(0,8).map(i=>{
    const c=i.sentiment==="positive"?"var(--pos)":i.sentiment==="negative"?"var(--neg)":"var(--faint)";
    const txt=(i.text||"").length>180?i.text.slice(0,180)+"…":(i.text||"");
    const cred=i.credibility!=null?` · güven ${i.credibility}`:"";
    const a=i.url?`<a href="${i.url}" target="_blank" rel="noopener">${esc(txt)}</a>`:esc(txt);
    return `<div class="ev"><span class="d" style="background:${c}"></span><span>${a}
      <span class="src">${i.source} · @${esc(i.author||"?")}<span class="cred">${cred}</span></span></span></div>`;
  }).join("");
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

$("seg").onclick=e=>{const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#seg button").forEach(x=>x.classList.remove("on"));b.classList.add("on");FILTER=b.dataset.m;render();};
$("rb").onclick=load;
load(); setInterval(load, 60*1000);  // arayüz her dakika sunucudan tazeler
</script>
